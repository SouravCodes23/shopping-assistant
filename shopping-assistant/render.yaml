services:
  - type: web
    name: shopping-assistant
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install uv && uv sync
    startCommand: uv run adk web . --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false            # You will paste this manually in the Render dashboard
      - key: GOOGLE_GENAI_USE_VERTEXAI
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11"
