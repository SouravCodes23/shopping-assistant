rules:
  - id: hardcoded-google-api-key
    patterns:
      - pattern-regex: 'AIzaSy[A-Za-z0-9_\-]+'
    message: >
      SECURITY: Hardcoded Google API key detected (matched prefix 'AIzaSy...').
      Never commit API keys to source control. Use environment variables,
      Application Default Credentials (ADC), or Google Cloud Secret Manager
      instead. See: https://cloud.google.com/docs/authentication
    languages:
      - python
    severity: ERROR
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      references:
        - https://cloud.google.com/docs/authentication
        - https://cloud.google.com/secret-manager/docs
